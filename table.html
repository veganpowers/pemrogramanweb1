<!DOCTYPE html>
<html>
<head>
    <title>Belajar HTML Table</title>
</head>
<body>
    <div align="center">
        <table border="2" width="450">
            <tr>
                <td colspan="3" bgcolor="#FF9900" align="center">
                    <b>kolom 1, 2 dan 3 dengan colspan</b>
                </td>
            </tr>

            <tr>
                <td rowspan="2" align="center">kolom 1A<br>+kolom 1B (rowspan)</td>
                <td align="center">kolom 2A</td>
                <td rowspan="2" align="center">kolom 3A<br>+kolom 3B (rowspan)</td>
            </tr>

            <tr>
                <td width="100" height="137" align="center">
                    <img title="myPerform" src="20260308_185636.jpg" width="100" alt="mypicture">
                </td>
            </tr>

            <tr>
                <td align="center">kolom 1C</td>
                <td align="center">kolom 2C</td>
                <td align="center">kolom 3C</td>
            </tr>
        </table>
    </div>
</body>
</html>
